name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      # Use GCC 12 to avoid autocxx const-correctness issues with GCC 14
      CC: gcc-12
      CXX: g++-12
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev gcc-12 g++-12

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run CI checks
        run: just ci
