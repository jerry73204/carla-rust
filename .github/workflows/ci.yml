name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      # autocxx generates C++ code with const-correctness issues rejected by GCC 12+
      CC: gcc-11
      CXX: g++-11
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev gcc-11 g++-11

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run CI checks
        run: just ci
