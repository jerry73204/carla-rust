name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      # Pin libclang to match the version used to develop autocxx bindings
      LIBCLANG_PATH: /usr/lib/llvm-14/lib
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-14-dev

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run CI checks
        run: just ci
