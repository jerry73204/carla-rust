name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      # Use clang as the C++ compiler for autocxx-generated code.
      # GCC 12+ rejects const-correctness issues in autocxx output,
      # but clang (which autocxx targets) compiles it correctly.
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev libudev-dev

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run CI checks
        run: just ci
