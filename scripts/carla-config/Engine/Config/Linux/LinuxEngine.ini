[Audio]
PlatformHeadroomDB=0

[SystemSettings]
r.setres=1280x720
fx.NiagaraAllowRuntimeScalabilityChanges=1

[SystemSettingsEditor]

[/Script/SourceCodeAccess.SourceCodeAccessSettings]
PreferredAccessor=NullSourceCodeAccessor

[TextureStreaming]
; Reduced from 70 to limit VRAM usage during testing
PoolSizeVRAMPercentage=30

[DeviceProfileManager]
DeviceProfileSelectionModule="LinuxDeviceProfileSelector"

[ConsoleVariables]
; Increased from 60000 (60s) to 300000 (5 min) to fix crash on driver 580 / RTX 5090.
; The render thread needs more time to initialize Vulkan on newer hardware.
; See: https://github.com/carla-simulator/carla/discussions/7076
;      https://github.com/carla-simulator/carla/issues/8369
g.TimeoutForBlockOnRenderFence=300000

; Cap FPS to reduce CPU/GPU load during testing (not interactive, accuracy is sufficient)
t.MaxFPS=10

; --- Memory reduction: keep within 2-3 GB on a shared server ---
; Texture streaming pool (MB) - minimal for testing
r.Streaming.PoolSize=256
; Disable mesh distance field atlas (very memory-heavy build step)
r.MeshDistanceFields=0
; Disable screen-space effects that need extra buffers
r.ScreenSpaceReflections=0
r.Fog=0
; Minimal shadow quality
r.Shadow.DistanceScale=0.1
r.Shadow.CSMDepthBias=0

[PlatformCrypto]
PlatformRequiresDataCrypto=True

[OnlineSubsystem]
LocalPlatformName=LNX
